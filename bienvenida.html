<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Supervisión</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text-color: #333333;
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: #cccccc;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            --panel-bg: rgba(30, 30, 40, 0.85);
            --text-color: #ffffff;
            --input-bg: rgba(50, 50, 65, 0.9);
            --input-border: #555565;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: var(--bg-gradient); 
            margin: 0;
            transition: background 0.5s ease;
        }

        .container { 
            background: var(--panel-bg); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 var(--shadow); 
            width: 340px; 
            text-align: center; 
            color: var(--text-color);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-supervisor {
            font-size: 24px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px; /* Ajustado el margen ya que quitamos el subtítulo */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .lbl-green {
            color: #28a745; 
        }

        .lbl-user {
            font-weight: 500;
        }
        
        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 12px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button:hover { transform: translateY(-1px); }

        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #128C7E; }
        
        .btn-logout { background: #dc3545; color: white; margin-top: 25px; }
        .btn-logout:hover { background: #bd2130; }

        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <div class="container">
        <!-- Encabezado con el Supervisor -->
        <div class="header-supervisor">
            <span class="lbl-green">Supervisor:</span>
            <span id="usuarioNombre" class="lbl-user">...</span>
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--input-border); margin: 20px 0;">
        
        <!-- Texto modificado según tu requerimiento -->
        <h3 style="margin-bottom:10px; font-size: 16px;">Envio de paños a la planta acabados</h3>
        <textarea id="txtMensaje" placeholder="Escribe aquí el mensaje..."></textarea>
        <button class="btn-whatsapp" onclick="enviarWhatsAppInmune()">Enviar a WhatsApp 💬</button>

        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <script>
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-btn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

            const nombreUsuario = localStorage.getItem('usuarioLogueado');
            if (!nombreUsuario) {
                alert("Acceso denegado. Por favor inicia sesión.");
                irAPagina("index.html");
            } else {
                document.getElementById('usuarioNombre').innerText = nombreUsuario;
                document.getElementById('txtMensaje').value = "¡Hola! Soy " + nombreUsuario + " y acabo de iniciar sesión en el sistema.";
            }
        };

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.querySelector('.theme-btn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        }

        function enviarWhatsAppInmune() {
            const mensaje = document.getElementById('txtMensaje').value.trim();
            if (!mensaje) return alert("Por favor, escribe un mensaje antes de enviar.");
            
            const mensajeCodificado = encodeURIComponent(mensaje);
            const urlFinal = `https://wa.me{mensajeCodificado}`;
            window.open(urlFinal, '_blank');
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioLogueado');
            irAPagina("index.html");
        }

        function irAPagina(destino) {
            let path = window.location.pathname;
            if (window.location.hostname.includes("github.io")) {
                let segmentos = path.split('/').filter(Boolean);
                let nombreRepo = segmentos || "";
                window.location.href = window.location.origin + "/" + nombreRepo + "/" + destino;
            } else {
                window.location.href = destino;
            }
        }
    </script>
</body>
</html>
