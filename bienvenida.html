<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Bienvenido - Envío de WhatsApp</title>
 <style>
 :root {
 --bg-gradient: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
 --panel-bg: rgba(30, 30, 40, 0.85);
 --text-color: #ffffff;
 --shadow: rgba(0, 0, 0, 0.5);
 }
 body { 
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
 display: flex; 
 justify-content: center; 
 align-items: center; 
 height: 100vh; 
 background: var(--bg-gradient); 
 margin: 0;
 }
 .container { 
 background: var(--panel-bg); 
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 padding: 40px 30px; 
 border-radius: 16px; 
 box-shadow: 0 8px 32px 0 var(--shadow); 
 width: 350px; 
 text-align: center; 
 color: var(--text-color);
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 h2 {
 margin-top: 0;
 margin-bottom: 25px;
 font-size: 24px;
 }
 button { 
 width: 100%; 
 padding: 15px; 
 border: none; 
 border-radius: 8px; 
 cursor: pointer; 
 font-size: 16px; 
 font-weight: bold;
 transition: all 0.2s ease;
 box-shadow: 0 4px 10px rgba(0,0,0,0.2);
 }
 button:hover { transform: translateY(-1px); }
 .btn-whatsapp { background: #25D366; color: white; }
 .btn-whatsapp:hover { background: #128C7E; }
 .btn-logout { background: #dc3545; color: white; margin-top: 20px; padding: 10px; font-size: 14px; }
 .btn-logout:hover { background: #bd2130; }
 </style>
</head>
<body>
 <div class="container">
 <h2>¡Bienvenido!</h2>
 
 <!-- Botón simplificado de envío directo -->
 <button class="btn-whatsapp" onclick="enviarMensaje()">Enviar Mensaje</button>
 
 <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
 </div>

 <script>
 function enviarMensaje() {
 // Mensaje fijo configurado: "everyone"
 const mensaje = "everyone";
 const mensajeCodificado = encodeURIComponent(mensaje);
 
 // Enlace directo al número 946068651 con código de Perú (51)
 const urlFinal = "https://wa.me" + mensajeCodificado;
 window.open(urlFinal, '_blank');
 }

 function cerrarSesion() {
 localStorage.removeItem('usuarioLogueado');
 irAPagina("index.html");
 }

 function irAPagina(destino) {
 if (window.location.hostname.includes("github.io")) {
 let path = window.location.pathname;
 let segmentos = path.split('/').filter(Boolean);
 let nombreRepo = segmentos || ""; 
 window.location.href = window.location.origin + "/" + nombreRepo + "/" + destino;
 } else {
 window.location.href = destino;
 }
 }
 </script>
</body>
</html>
