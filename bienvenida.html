<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso Premium</title>
    <style>
        /* Variables de colores para cambiar entre temas */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text-color: #333333;
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: #cccccc;
            --btn-bg: #007BFF;
            --btn-hover: #0056b3;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            --panel-bg: rgba(30, 30, 40, 0.85);
            --text-color: #ffffff;
            --input-bg: rgba(50, 50, 65, 0.9);
            --input-border: #555565;
            --btn-bg: #0056b3;
            --btn-hover: #004085;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: var(--bg-gradient); 
            margin: 0;
            transition: background 0.5s ease;
        }

        /* Caja contenedora con efecto cristal (Glassmorphism) */
        .container { 
            background: var(--panel-bg); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 var(--shadow); 
            width: 320px; 
            text-align: center; 
            color: var(--text-color);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { margin-bottom: 25px; font-weight: 600; }
        
        input[type="text"]:not(.input-group input), input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid var(--input-border); 
            border-radius: 8px; 
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .input-group, .password-group {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input, .password-group input {
            flex: 1;
            border: none !important;
            margin: 0 !important;
            padding: 12px;
            outline: none;
            background: transparent;
            color: var(--text-color);
            font-size: 15px;
        }

        .input-group select {
            border: none;
            background: transparent;
            padding: 12px 5px;
            outline: none;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            border-left: 1px solid var(--input-border);
        }

        .input-group select option {
            background: var(--input-bg);
            color: var(--text-color);
        }
        
        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 12px;
            margin: 0;
            width: auto;
            font-size: 16px;
        }

        button:not(.toggle-password):not(.theme-btn) { 
            width: 100%; 
            padding: 12px; 
            background: var(--btn-bg); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        button:not(.toggle-password):not(.theme-btn):hover { 
            background: var(--btn-hover); 
            transform: translateY(-1px);
        }

        .toggle-link { margin-top: 20px; color: var(--text-color); font-size: 14px; cursor: pointer; text-decoration: underline; opacity: 0.8; }
        .toggle-link:hover { opacity: 1; }
        .hidden { display: none; }

        /* Botón flotante para el Modo Oscuro */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Botón de Modo Oscuro -->
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <div class="container">
        <!-- Formulario Login -->
        <div id="loginForm">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="loginUsuario" placeholder="Usuario" required>
            
            <div class="password-group">
                <input type="password" id="loginPass" placeholder="Contraseña" required>
                <button type="button" class="toggle-password" onclick="alternarVisibilidad('loginPass', this)">👁️</button>
            </div>
            
            <button onclick="ejecutarAccion('login')">Ingresar</button>
            <div class="toggle-link" onclick="cambiarFormulario(false)">¿No tienes cuenta? Regístrate</div>
        </div>

        <!-- Formulario Registro -->
        <div id="registerForm" class="hidden">
            <h2>Registrarse</h2>
            <input type="text" id="regUsuario" placeholder="Usuario" required>
            <div class="input-group">
                <input type="text" id="regEmailUser" placeholder="Correo Electrónico" oninput="validarArroba(this)" required>
                <select id="regEmailDomain">
                    <option value="@gmail.com">@gmail.com</option>
                    <option value="@uni.pe">@uni.pe</option>
                    <option value="@fisanet.com.pe">@fisanet.com.pe</option>
                    <option value="@hotmail.com">@hotmail.com</option>
                </select>
            </div>
            
            <div class="password-group">
                <input type="password" id="regPass" placeholder="Contraseña (mín. 6 caracteres)" required>
                <button type="button" class="toggle-password" onclick="alternarVisibilidad('regPass', this)">👁️</button>
            </div>
            
            <button onclick="ejecutarAccion('register')">Registrarme</button>
            <div class="toggle-link" onclick="cambiarFormulario(true)">¿Ya tienes cuenta? Inicia sesión</div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://google.com";

        // Cargar tema guardado al iniciar
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-btn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.querySelector('.theme-btn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        }

        function cambiarFormulario(mostrarLogin) {
            document.getElementById('loginForm').classList.toggle('hidden', !mostrarLogin);
            document.getElementById('registerForm').classList.toggle('hidden', mostrarLogin);
            restablecerContrasenas();
            limpiarCampos();
        }

        function alternarVisibilidad(inputId, boton) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                boton.innerText = "🙈";
            } else {
                input.type = "password";
                boton.innerText = "👁️";
            }
        }

        function restablecerContrasenas() {
            document.getElementById('loginPass').type = "password";
            document.getElementById('regPass').type = "password";
            document.querySelectorAll('.toggle-password').forEach(btn => btn.innerText = "👁️");
        }

        function limpiarCampos() {
            document.getElementById('loginUsuario').value = "";
            document.getElementById('loginPass').value = "";
            document.getElementById('regUsuario').value = "";
            document.getElementById('regEmailUser').value = "";
            document.getElementById('regPass').value = "";
        }

        function validarArroba(input) {
            if (input.value.includes('@')) {
                alert("No es necesario escribir el '@'. Selecciona tu servidor de correo en la lista.");
                input.value = input.value.replace(/@/g, '');
            }
        }

        async function ejecutarAccion(action) {
            let payload = { action: action };

            if (action === 'register') {
                payload.usuario = document.getElementById('regUsuario').value.trim();
                let emailUser = document.getElementById('regEmailUser').value.trim();
                let emailDomain = document.getElementById('regEmailDomain').value;
                payload.correo = emailUser ? (emailUser + emailDomain) : "";
                payload.password = document.getElementById('regPass').value;
                
                if(!payload.usuario || !emailUser || !payload.password) return alert("⚠️ Completa todos los campos.");
                if(payload.usuario.length < 3) return alert("⚠️ El usuario debe tener al menos 3 caracteres.");
                if(payload.password.length < 6) return alert("🔒 La contraseña debe tener un mínimo de 6 caracteres.");
            } else {
                payload.usuario = document.getElementById('loginUsuario').value.trim();
                payload.password = document.getElementById('loginPass').value;
                if(!payload.usuario || !payload.password) return alert("⚠️ Ingresa tu usuario y contraseña.");
            }

            try {
                let res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                
                let resultado = await res.json();

                if (resultado.status === "success") {
                    if (action === 'register') {
                        alert(resultado.message);
                        cambiarFormulario(true);
                    } else {
                        localStorage.setItem('usuarioLogueado', resultado.name);
                        irAPagina("bienvenida.html");
                    }
                } else {
                    alert(resultado.message);
                }
            } catch (error) {
                alert("Error de conexión con la base de datos.");
                console.error(error);
            }
        }

        function irAPagina(destino) {
            let path = window.location.pathname;
            if (window.location.hostname.includes("github.io")) {
                let segmentos = path.split('/').filter(Boolean);
                let nombreRepo = segmentos[0] || "";
                window.location.href = window.location.origin + "/" + nombreRepo + "/" + destino;
            } else {
                window.location.href = destino;
            }
        }
    </script>
</body>
</html>
